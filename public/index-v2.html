<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuthX - V2 (Secure)</title>
    <style>
        .tab-content, .dashboard { display: none; }
        .tab-content.active, .dashboard.active { display: block; }
        .message { display: none; font-weight: bold; margin-top: 10px; }
        .success, .info { color: green; display: block; }
        .error, .warning { color: red; display: block; }
        fieldset { margin-bottom: 20px; padding: 10px; }
        .requirement.met::before { content: "✓ "; color: green; }
        .requirement.unmet::before { content: "✗ "; color: red; }
    </style>
</head>
<body>
    <h1> AuthX - Break the Login (V2)</h1>
    <p> Versiune Securizată</p>

    <div style="margin-bottom: 10px;">
        <button onclick="switchTab('login')">Login</button>
        <button onclick="switchTab('register')">Register</button>
        <button onclick="switchTab('forgot')">Forgot Password</button>
    </div>

    <div id="login" class="tab-content active">
        <fieldset>
            <legend>Login</legend>
            <form onsubmit="login(event)">
                <label>Username: <input type="text" id="login_username" required></label><br><br>
                <label>Password: <input type="password" id="login_password" required></label><br><br>
                <button type="submit">Login</button>
                <div id="login_message" class="message"></div>
            </form>
            <hr>
            <small>Autologin Demo: 
                <button onclick="testLogin('admin', 'SecurePass123!')">admin / SecurePass123!</button>
            </small>
        </fieldset>
    </div>

    <div id="register" class="tab-content">
        <fieldset>
            <legend>Register</legend>
            <form onsubmit="register(event)">
                <label>Username: <input type="text" id="reg_username" required></label><br><br>
                <label>Email: <input type="email" id="reg_email" required></label><br><br>
                <label>Password: <input type="password" id="reg_password" required oninput="checkPasswordStrength(this.value)"></label><br>
                
                <div style="margin-top:5px; font-size:12px;">
                    <div id="req_length" class="requirement unmet">Min 12 chars</div>
                    <div id="req_upper" class="requirement unmet">Uppercase</div>
                    <div id="req_lower" class="requirement unmet">Lowercase</div>
                    <div id="req_number" class="requirement unmet">Number</div>
                    <div id="req_special" class="requirement unmet">Special char</div>
                </div><br>

                <button type="submit">Register</button>
                <div id="register_message" class="message"></div>
            </form>
        </fieldset>
    </div>

    <div id="forgot" class="tab-content">
        <fieldset>
            <legend>Forgot Password</legend>
            <form onsubmit="forgotPassword(event)">
                <label>Email: <input type="email" id="forgot_email" required></label><br><br>
                <button type="submit">Send Reset Link</button>
                <div id="forgot_message" class="message"></div>
            </form>
            
            <div id="reset_form_container" style="display: none; margin-top: 15px;">
                <form onsubmit="resetPassword(event)">
                    <label>Reset Token: <input type="text" id="reset_token" required></label><br><br>
                    <label>New Password: <input type="password" id="reset_password" required oninput="checkPasswordStrengthReset(this.value)"></label><br>
                    
                    <div style="margin-top:5px; font-size:12px;">
                        <div id="req_length_reset" class="requirement unmet">Min 12 chars</div>
                        <div id="req_upper_reset" class="requirement unmet">Uppercase</div>
                        <div id="req_lower_reset" class="requirement unmet">Lowercase</div>
                        <div id="req_number_reset" class="requirement unmet">Number</div>
                        <div id="req_special_reset" class="requirement unmet">Special char</div>
                    </div><br>

                    <button type="submit">Reset Password</button>
                    <div id="reset_message" class="message"></div>
                </form>
            </div>
        </fieldset>
    </div>

    <div id="dashboard" class="dashboard">
        <fieldset>
            <legend>Dashboard</legend>
            <h2>Welcome!</h2>
            <div id="user_info"></div><br>
            <button onclick="logout()">Logout</button>
            <div id="logout_message" class="message"></div>
        </fieldset>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
        }

        function checkPasswordStrength(password) { updatePasswordRequirements(password, ''); }
        function checkPasswordStrengthReset(password) { updatePasswordRequirements(password, '_reset'); }

        function updatePasswordRequirements(password, suffix) {
            document.getElementById(`req_length${suffix}`).className = `requirement ${password.length >= 12 ? 'met' : 'unmet'}`;
            document.getElementById(`req_upper${suffix}`).className = `requirement ${/[A-Z]/.test(password) ? 'met' : 'unmet'}`;
            document.getElementById(`req_lower${suffix}`).className = `requirement ${/[a-z]/.test(password) ? 'met' : 'unmet'}`;
            document.getElementById(`req_number${suffix}`).className = `requirement ${/[0-9]/.test(password) ? 'met' : 'unmet'}`;
            document.getElementById(`req_special${suffix}`).className = `requirement ${/[!@#$%^&*]/.test(password) ? 'met' : 'unmet'}`;
        }

        async function register(e) {
            e.preventDefault();
            const username = document.getElementById('reg_username').value;
            const email = document.getElementById('reg_email').value;
            const password = document.getElementById('reg_password').value;
            try {
                const response = await fetch('http://localhost:3002/api/register', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await response.json();
                if (response.ok) {
                    showMessage('register_message', 'success', '✓ Registration successful!');
                    e.target.reset();
                } else {
                    showMessage('register_message', 'error', '✗ ' + (data.details ? data.details.join(', ') : data.error));
                }
            } catch (err) { showMessage('register_message', 'error', 'Error: ' + err.message); }
        }

        async function login(e) {
            e.preventDefault();
            const username = document.getElementById('login_username').value;
            const password = document.getElementById('login_password').value;
            try {
                const response = await fetch('http://localhost:3002/api/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    credentials: 'include', body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (response.ok) {
                    document.getElementById('login').classList.remove('active');
                    document.getElementById('dashboard').classList.add('active');
                    document.getElementById('user_info').innerHTML = `
                        Username: ${data.user.username} <br>
                        Email: ${data.user.email} <br>
                        Role: ${data.user.role}
                    `;
                } else {
                    showMessage('login_message', 'error', '✗ ' + (data.error || 'Login failed'));
                }
            } catch (err) { showMessage('login_message', 'error', 'Error: ' + err.message); }
        }

        async function logout() {
            try {
                const response = await fetch('http://localhost:3002/api/logout', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    credentials: 'include'
                });
                if (response.ok) {
                    document.getElementById('dashboard').classList.remove('active');
                    document.getElementById('login').classList.add('active');
                    document.getElementById('login_username').value = '';
                    document.getElementById('login_password').value = '';
                }
            } catch (err) { alert('Logout error: ' + err.message); }
        }

        async function forgotPassword(e) {
            e.preventDefault();
            const email = document.getElementById('forgot_email').value;
            try {
                const response = await fetch('http://localhost:3002/api/forgot-password', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();
                showMessage('forgot_message', 'info', data.message);
                document.getElementById('reset_form_container').style.display = 'block';
                if (data.resetLink) {
                    showMessage('forgot_message', 'warning', `Token for testing: ${data.resetLink.split('token=')[1]}`);
                }
            } catch (err) { showMessage('forgot_message', 'error', 'Error: ' + err.message); }
        }

        async function resetPassword(e) {
            e.preventDefault();
            const token = document.getElementById('reset_token').value;
            const newPassword = document.getElementById('reset_password').value;
            try {
                const response = await fetch('http://localhost:3002/api/reset-password', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });
                const data = await response.json();
                if (response.ok) {
                    showMessage('reset_message', 'success', data.message);
                } else {
                    showMessage('reset_message', 'error', '✗ ' + (data.error || 'Reset failed'));
                }
            } catch (err) { showMessage('reset_message', 'error', 'Error: ' + err.message); }
        }

        function testLogin(u, p) {
            document.getElementById('login_username').value = u;
            document.getElementById('login_password').value = p;
        }

        function showMessage(id, type, text) {
            const el = document.getElementById(id);
            el.className = `message ${type}`;
            el.textContent = text;
        }
    </script>
</body>
</html>
